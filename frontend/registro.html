<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Crie sua conta</h1>
    </header>

    <main class="auth-page">
        <form action="/registro" method="POST">

            <section>
                <label for="inputNome">Nome de usuário</label>
                <input type="text" id="inputNome" name="nome" placeholder="Nome" required>
            </section>

            <section>
                <label for="inputEmail">E-mail</label>
                <input type="email" id="inputEmail" name="email" placeholder="E-mail" required>
            </section>

            <section>
                <label for="inputSenha">Senha</label>
                <input type="password" id="inputSenha" name="senha" placeholder="Senha" required>
            </section>

            <button type="submit">Continuar</button>
        </form>

        <p><a href="login.html">Já tenho uma conta</a></p>
    </main>

</body>
</html>
