<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <h1>Crie sua conta</h1>
        <a href="index.html" class="logo">PISCIS</a>
    </header>

    <main class="auth-page">
        <form id="register-form">

            <section>
                <label for="inputNome">Nome de usuário</label>
                <input type="text" id="inputNome" name="name" placeholder="Nome" required>
            </section>

            <section>
                <label for="inputEmail">E-mail</label>
                <input type="email" id="inputEmail" name="email" placeholder="E-mail" required>
            </section>

            <section>
                <label for="inputSenha">Senha</label>
                <input type="password" id="inputSenha" name="password" placeholder="Senha" required>
            </section>

            <section>
                <label for="inputConfirmaSenha">Confirmar senha</label>
                <input type="password" id="inputConfirmaSenha" name="confirm_password" placeholder="Confirmar senha" required>
            </section>

            <button type="submit">Continuar</button>

            <p id="register-message"></p>
        </form>

        <p><a href="login.html">Já tenho uma conta</a></p>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
